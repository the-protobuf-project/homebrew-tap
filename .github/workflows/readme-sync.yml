name: README Sync

on:
  push:
    branches:
      - main
    paths:
      - 'Formula/**/*.rb'
      - 'Casks/**/*.rb'
      - 'scripts/update_readme.rb'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate README package lists
        run: ruby scripts/update_readme.rb

      - name: Commit and push README updates
        run: |
          if git diff --quiet -- README.md; then
            echo "README already in sync; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: sync README package lists"
          git push
